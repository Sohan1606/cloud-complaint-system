version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: complaints
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma:/docker-entrypoint-initdb.d  # Auto-run schema

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/complaints?schema=public
      - JWT_SECRET=your-super-secret-jwt-key-change-for-production
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
    command: >
      sh -c "npx prisma generate &&
             npx prisma db push &&
             npm run dev"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:


